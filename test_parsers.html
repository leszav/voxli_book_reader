<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parser Test</title>
    <style>
        body { font-family: system-ui, sans-serif; padding: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .test-section h3 { margin-top: 0; }
        .result { margin: 10px 0; padding: 10px; background: #f5f5f5; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        pre { overflow-x: auto; padding: 10px; background: #f8f9fa; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>FB2/EPUB Parser Test</h1>
    
    <div class="test-section">
        <h3>FB2 Parser Imports</h3>
        <div id="fb2-import-result" class="result">Testing...</div>
    </div>

    <div class="test-section">
        <h3>EPUB Parser Imports</h3>
        <div id="epub-import-result" class="result">Testing...</div>
    </div>

    <div class="test-section">
        <h3>FB2 Tag Support</h3>
        <input type="file" id="fb2-file" accept=".fb2" />
        <button onclick="testFb2()">Test FB2 File</button>
        <div id="fb2-test-result" class="result"></div>
    </div>

    <div class="test-section">
        <h3>EPUB Tag Support</h3>
        <input type="file" id="epub-file" accept=".epub" />
        <button onclick="testEpub()">Test EPUB File</button>
        <div id="epub-test-result" class="result"></div>
    </div>

    <script type="module">
        // Test imports
        try {
            const fb2Module = await import('./src/parsers/fb2.js');
            document.getElementById('fb2-import-result').innerHTML = 
                '<span class="success">✓ FB2 parser imported successfully</span><br>Exports: ' + 
                Object.keys(fb2Module).join(', ');
        } catch (e) {
            document.getElementById('fb2-import-result').innerHTML = 
                '<span class="error">✗ FB2 parser import failed: ' + e.message + '</span>';
        }

        try {
            const epubModule = await import('./src/parsers/epub.js');
            document.getElementById('epub-import-result').innerHTML = 
                '<span class="success">✓ EPUB parser imported successfully</span><br>Exports: ' + 
                Object.keys(epubModule).join(', ');
        } catch (e) {
            document.getElementById('epub-import-result').innerHTML = 
                '<span class="error">✗ EPUB parser import failed: ' + e.message + '</span>';
        }

        window.testFb2 = async function() {
            const fileInput = document.getElementById('fb2-file');
            const resultDiv = document.getElementById('fb2-test-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<span class="error">Please select a file</span>';
                return;
            }

            try {
                const { parseFb2 } = await import('./src/parsers/fb2.js');
                const result = await parseFb2(fileInput.files[0]);
                
                const tags = [];
                result.chapters.forEach(ch => {
                    const chapterTags = ch.content.match(/<\w+/g) || [];
                    tags.push(...chapterTags);
                });
                const uniqueTags = [...new Set(tags)].sort();
                
                resultDiv.innerHTML = `
                    <span class="success">✓ Parsed successfully</span>
                    <p>Title: ${result.title}</p>
                    <p>Chapters: ${result.chapters.length}</p>
                    <p>Tags found: ${uniqueTags.join(', ')}</p>
                    <details>
                        <summary>Full output (first chapter preview)</summary>
                        <pre>${result.chapters[0]?.content?.substring(0, 1000) || 'No chapters'}</pre>
                    </details>
                `;
            } catch (e) {
                resultDiv.innerHTML = '<span class="error">✗ Parse failed: ' + e.message + '</span>';
                console.error(e);
            }
        };

        window.testEpub = async function() {
            const fileInput = document.getElementById('epub-file');
            const resultDiv = document.getElementById('epub-test-result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<span class="error">Please select a file</span>';
                return;
            }

            resultDiv.innerHTML = 'Loading JSZip and parsing...';
            
            try {
                // Load JSZip
                if (!window.JSZip) {
                    const script = document.createElement('script');
                    script.src = './src/vendor/jszip.min.js';
                    await new Promise((resolve, reject) => {
                        script.onload = resolve;
                        script.onerror = reject;
                        document.head.appendChild(script);
                    });
                }

                const { parseEpub } = await import('./src/parsers/epub.js');
                const result = await parseEpub(fileInput.files[0]);
                
                const tags = [];
                result.chapters.forEach(ch => {
                    const chapterTags = ch.content.match(/<\w+/g) || [];
                    tags.push(...chapterTags);
                });
                const uniqueTags = [...new Set(tags)].sort();
                
                resultDiv.innerHTML = `
                    <span class="success">✓ Parsed successfully</span>
                    <p>Title: ${result.title}</p>
                    <p>Chapters: ${result.chapters.length}</p>
                    <p>Tags found: ${uniqueTags.join(', ')}</p>
                    <details>
                        <summary>Full output (first chapter preview)</summary>
                        <pre>${result.chapters[0]?.content?.substring(0, 1000) || 'No chapters'}</pre>
                    </details>
                `;
            } catch (e) {
                resultDiv.innerHTML = '<span class="error">✗ Parse failed: ' + e.message + '</span>';
                console.error(e);
            }
        };
    </script>
</body>
</html>
