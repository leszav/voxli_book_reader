<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Reader</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="popup-body">
    <main class="popup">
      <h1 data-i18n="popupTitle">Reader</h1>
      <button id="open-book" class="btn primary" data-i18n="openBook">Open Book</button>
      <button id="open-last" class="btn" data-i18n="openLastBook">Open Last Book</button>
      <button id="open-settings" class="btn" data-i18n="openSettings">Language & Settings</button>
      <p id="status" class="status" data-i18n="statusIdle">Ready</p>
    </main>
    <input id="popup-file-input" type="file" accept=".epub,.fb2" hidden />
    <script type="module" src="src/popup.js"></script>
  </body>
</html>
