<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pick a book</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        background: #f5f5f5;
      }
      .container {
        text-align: center;
        padding: 24px;
      }
      .msg p {
        margin: 8px 0;
        color: #333;
        font-size: 16px;
      }
      .btn {
        background: #4CAF50;
        color: white;
        border: none;
        padding: 12px 24px;
        font-size: 16px;
        border-radius: 6px;
        cursor: pointer;
        margin-top: 16px;
        transition: background 0.2s;
      }
      .btn:hover {
        background: #45a049;
      }
      .btn:active {
        background: #3d8b40;
      }
      .btn:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      #picker-file-input {
        display: none;
      }
      /* Spinner styles */
      .loading-container {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .loading-container.active {
        display: flex;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e0e0e0;
        border-top-color: #4CAF50;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .loading-text {
        color: #333;
        font-size: 14px;
        margin: 0;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="container" id="main-container">
      <div class="msg">
        <p data-i18n="selectBookFile">Please select a book file (EPUB or FB2)</p>
      </div>
      <button id="select-file-btn" class="btn" data-i18n="selectFile">Select File</button>
      <input id="picker-file-input" type="file" accept=".epub,.fb2" />
    </div>
    
    <div class="loading-container" id="loading-container">
      <div class="spinner"></div>
      <p class="loading-text" data-i18n="loadingBook">Loading book, please wait...</p>
    </div>
    
    <script type="module" src="src/filepicker.js"></script>
  </body>
</html>
